- name: Sync from Gitee (clean approach)
  run: |
    # 1. 备份 GitHub workflows
    mkdir -p /tmp/github-workflows
    cp -r .github/workflows/* /tmp/github-workflows/ 2>/dev/null || true
    
    # 2. 获取 Gitee 最新文件（使用 archive，不操作 git 历史）
    git fetch gitee main
    git archive --prefix=gitee-src/ gitee/main | tar -x
    
    # 3. 清理当前目录（保留 .git）
    find . -maxdepth 1 -not -path "./.git" -not -path "." -exec rm -rf {} + 2>/dev/null || true
    
    # 4. 复制 Gitee 文件（排除 .github）
    cp -r gitee-src/* . 2>/dev/null || true
    cp -r gitee-src/.* . 2>/dev/null || true
    rm -rf .github gitee-src
    
    # 5. 恢复 GitHub workflows
    mkdir -p .github/workflows
    cp /tmp/github-workflows/* .github/workflows/ 2>/dev/null || true
    
    # 6. 提交并推送
    git add -A
    git status
    git commit -m "Sync from Gitee (preserve GitHub workflows, $(date +%Y-%m-%d-%H:%M))" || echo "No changes"
    git push origin main --force