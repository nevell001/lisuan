name: Sync from Gitee

on:
  schedule:
    - cron: '0 1,7,13 * * *'  # UTC 1:00, 7:00, 13:00 = 北京时间 9:00, 15:00, 21:00
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "nevell"
          git config --global user.email "nevell001@gmail.com"

      - name: Force sync from Gitee
        run: |
          # 添加 Gitee 远程
          git remote add gitee https://gitee.com/nevell/hello.git || true
          
          # 获取 Gitee 更新
          git fetch gitee main
          
          # 备份 GitHub 的 workflows
          mkdir -p /tmp/workflows-backup
          cp .github/workflows/* /tmp/workflows-backup/ 2>/dev/null || true
          
          # 强制重置到 Gitee 的 main 分支
          git reset --hard gitee/main
          
          # 恢复 GitHub 的 workflows
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp /tmp/workflows-backup/* .github/workflows/ 2>/dev/null || true
          
          # 提交并强制推送
          git add .
          git commit -m "Sync from Gitee $(date +%Y-%m-%d-%H:%M)" || echo "No changes"
          git push origin main --force
