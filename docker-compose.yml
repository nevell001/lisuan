services:
  mysql:
    image: mysql:8.0
    container_name: cashier-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: RootPassword123!
      MYSQL_DATABASE: cashier_system
      TZ: Asia/Shanghai
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0 --skip-name-resolve
    ports:
      - "0.0.0.0:3306:3306"
    volumes:
      - cashier-mysql-data:/var/lib/mysql
      - ./docker/mysql-init/00-init-complete.sql:/docker-entrypoint-initdb.d/00-init-complete.sql:ro
      - ./docker/mysql-backup:/backup
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  cashier-mysql-data:
    driver: local

networks:
  cashier-network:
    driver: bridge
