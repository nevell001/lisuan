services:
  mysql:
    image: mysql:8.0
    container_name: cashier-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: RootPassword123!
      MYSQL_DATABASE: cashier_system
      TZ: Asia/Shanghai
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0 --skip-name-resolve
    volumes:
      - cashier-mysql-data:/var/lib/mysql
      - ./docker/mysql-init/00-grant-root-permissions.sql:/docker-entrypoint-initdb.d/00-grant-root-permissions.sql:ro
      - ./docker/mysql-init/01-create-user.sql:/docker-entrypoint-initdb.d/01-create-user.sql:ro
      - ./docker/mysql-init/02-alter-tables.sql:/docker-entrypoint-initdb.d/02-alter-tables.sql:ro
      - ./docker/mysql-init/03-sample-data.sql:/docker-entrypoint-initdb.d/03-sample-data.sql:ro
      - ./docker/mysql-backup:/backup
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - cashier-network

volumes:
  cashier-mysql-data:
    driver: local

networks:
  cashier-network:
    driver: bridge
