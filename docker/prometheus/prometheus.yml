global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'mysql'
    static_configs:
      - targets: ['cashier-mysql:9104']
    metrics_path: /metrics

  - job_name: 'app'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: /actuator/prometheus