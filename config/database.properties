# 收银系统数据库配置

# MySQL 数据库连接 URL
db.url=jdbc:mysql://localhost:3306/cashier_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8mb4

# MySQL 用户名
db.username=root

# MySQL 密码
# 注意：生产环境应使用环境变量 CASHER_DB_PASSWORD
db.password=RootPassword123!

# 数据库连接池大小
db.pool.size=10

# 连接超时时间（毫秒）
db.connection.timeout=30000

# 空闲连接超时（毫秒）
db.idle.timeout=600000

# 连接最大生命周期（毫秒）
db.max.lifetime=1800000