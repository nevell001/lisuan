# Database Configuration
# ============================================
# 从外部 Windows 设备连接说明：
# ============================================
# 如果您的 Windows 应用程序运行在另一台设备上，需要使用 Windows 主机的 IP 地址
# 
# 1. 在 Windows 主机上执行以下命令获取 IP 地址：
#    - 打开 PowerShell，运行：ipconfig
#    - 找到 WSL 或 vEthernet (WSL) 适配器的 IPv4 地址
#    - 或者使用：ipconfig | findstr "IPv4"
#
# 2. 将下面的 IP 地址替换为 Windows 主机的实际 IP 地址
#    例如：db.url=jdbc:mysql://192.168.1.100:3306/...
#
# 3. 确保 Windows 防火墙允许 3306 端口的入站连接
#    - 打开 Windows 防火墙高级安全
#    - 添加入站规则，允许 TCP 3306 端口
#
# 4. 如果使用 localhost 或 127.0.0.1，只能从 WSL2 内部访问
# ============================================

# 本地连接（WSL2 内部）
db.url=jdbc:mysql://127.0.0.1:3306/cashier_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8mb4

# 远程连接（外部 Windows 设备）- 请取消注释并替换 IP
# db.url=jdbc:mysql://<WINDOWS_HOST_IP>:3306/cashier_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8mb4

db.username=root
db.password=RootPassword123!
db.pool.size=10
db.connection.timeout=30000
db.idle.timeout=600000
db.max.lifetime=1800000
